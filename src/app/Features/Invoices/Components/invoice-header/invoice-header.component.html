<div [formGroup]="headerForm" class="header-grid">
  
  <div class="left-section">
    <mat-form-field>
      <mat-label>Invoice Date</mat-label>
      <input matInput [matDatepicker]="picker" formControlName="invoiceDate">
      <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>
      <mat-datepicker #picker></mat-datepicker>
    </mat-form-field>

    <mat-form-field>
      <mat-label>Supplier Name</mat-label>
      <mat-select formControlName="supplierId">
        @for (supplier of suppliers; track supplier.id) {
          <mat-option [value]="supplier.id">{{ supplier.name }}</mat-option>
        }
      </mat-select>
    </mat-form-field>
  </div>

  <mat-form-field class="notes-field">
    <mat-label>Notes</mat-label>
    <textarea matInput formControlName="notes" placeholder="Enter any additional details..." rows="5"></textarea>
  </mat-form-field>
  
</div>
