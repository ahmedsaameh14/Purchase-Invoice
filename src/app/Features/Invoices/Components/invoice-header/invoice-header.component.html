<div [formGroup]="headerForm" class="header-grid">
  
  <mat-form-field appearance="outline">
    <mat-label>Invoice Date</mat-label>
    <input matInput [matDatepicker]="picker" formControlName="invoiceDate">
    <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>
    <mat-datepicker #picker></mat-datepicker>
  </mat-form-field>

  <mat-form-field appearance="outline">
    <mat-label>Supplier Name</mat-label>
    <mat-select formControlName="supplierName">
      @for (supplier of suppliers; track supplier.id) {
        <mat-option [value]="supplier.name">{{ supplier.name }}</mat-option>
      }
    </mat-select>
  </mat-form-field>

  <mat-form-field appearance="outline" class="notes-field">
    <mat-label>Notes</mat-label>
    <textarea matInput formControlName="notes" placeholder="Enter any additional details..." rows="3"></textarea>
  </mat-form-field>
  
</div>
