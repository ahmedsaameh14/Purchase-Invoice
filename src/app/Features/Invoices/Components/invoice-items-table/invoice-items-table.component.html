<div [formGroup]="parentForm">
  <table class="mat-elevation-z2">
    <tbody formArrayName="items">
      @for (row of itemsFormArray.controls; track row; let i = $index) {
        <tr [formGroupName]="i">
          <td>
            <mat-form-field appearance="outline">
              <mat-select formControlName="itemCode">
                @for (p of products; track p.code) {
                  <mat-option [value]="p.code">{{ p.code }}</mat-option>
                }
              </mat-select>
            </mat-form-field>
          </td>

          <td>
            <input matInput formControlName="itemName" readonly>
          </td>

          <td>
            <input matInput type="number" formControlName="quantity">
          </td>

          <td>
            <input matInput type="number" formControlName="unitPrice">
          </td>

          <td>
            <strong>{{ row.get('lineTotal')?.value | currency }}</strong>
          </td>

          <td>
            <button mat-icon-button color="warn" (click)="removeRow(i)">
              <mat-icon>delete</mat-icon>
            </button>
          </td>
        </tr>
      }
    </tbody>
  </table>

  <button mat-stroked-button color="primary" type="button" (click)="addNewRow()" class="add-btn">
    <mat-icon>add</mat-icon> Add Item
  </button>
</div>
