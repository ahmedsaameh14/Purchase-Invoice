<div class="invoice-wrapper">
  <mat-card class="invoice-card">

    <mat-card-header>
      <mat-card-title>Purchase Invoice</mat-card-title>
      <mat-card-subtitle>Create a new entry for your records</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="invoiceForm">

        <section class="invoice-section">
          <h3>General Information</h3>
          <app-invoice-header [headerForm]="headerGroup" [suppliers]="suppliers">
          </app-invoice-header>
        </section>

        <mat-divider></mat-divider>

        <app-invoice-items-table [itemsFormArray]="itemsFormArray" [products]="products" (addRow)="addItemRow()">
        </app-invoice-items-table>

        <mat-divider></mat-divider>

        <section class="invoice-footer">
          <div class="total-display">
            <span>Total:</span>
            <strong>{{ invoiceForm.get('grandTotal')?.value | currency }}</strong>
          </div>
        </section>

      </form>
    </mat-card-content>

    <mat-card-actions align="end">
      <button mat-button color="warn">Reset</button>
      <button mat-raised-button color="primary" [disabled]="invoiceForm.invalid">
        Save Invoice
      </button>
    </mat-card-actions>

  </mat-card>
</div>
