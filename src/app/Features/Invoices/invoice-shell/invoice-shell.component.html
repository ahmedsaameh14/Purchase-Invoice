<div class="invoice-wrapper">
  <mat-card class="invoice-card">

    <mat-card-header>
      <mat-card-title>Purchase Invoice</mat-card-title>
      <mat-card-subtitle>Create a new entry for your records</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="invoiceForm">

        <section class="invoice-section header-section">
          <h3>General Information</h3>
          <app-invoice-header [headerForm]="headerGroup" [suppliers]="suppliers">
          </app-invoice-header>
        </section>

        <section class="invoice-section items-section">
          <h3>Invoice Items</h3>
          <app-invoice-items-table [itemsFormArray]="itemsFormArray" [products]="products" [canAddItem]="canAddItem" (addRow)="addItemRow()">
          </app-invoice-items-table>
        </section>

        <section class="invoice-footer">
          <div class="total-display">
            <span>Total:</span>
            <strong>{{ invoiceForm.get('grandTotal')?.value | currency }}</strong>
          </div>
        </section>

      </form>
    </mat-card-content>

    <mat-card-actions align="end" class="action-buttons">
      <button mat-button color="warn" (click)="resetInvoice()" class="action-btn">
        <mat-icon>restart_alt</mat-icon>
        Reset
      </button>

      <button mat-raised-button color="primary" [disabled]="invoiceForm.invalid" (click)="saveInvoice()" class="action-btn">
        <mat-icon>save</mat-icon>
        Save Invoice
      </button>
    </mat-card-actions>

  </mat-card>
</div>
